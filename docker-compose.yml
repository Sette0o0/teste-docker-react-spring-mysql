version: "3.9"

services:
  mysql:
    image: mysql:8
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: rafa
      MYSQL_DATABASE: biblioteca_spring
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: spring
    ports:
      - "8080:8080"
    depends_on:
      - mysql